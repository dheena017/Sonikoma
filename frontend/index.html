<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Primary SEO Metadata -->
    <title>Webtoon-to-Video Studio - AI Storyboard & Video Production</title>
    <meta
      name="title"
      content="Webtoon-to-Video Studio - AI Storyboard & Video Production"
    />
    <meta
      name="description"
      content="Transform static webtoons into cinematic videos. Crop panels, clean speech bubbles, synthesize voice narration, generate music soundtracks, and produce high-quality videos using advanced AI."
    />
    <meta
      name="keywords"
      content="webtoon to video, webtoon animation, ai storyboard, panel extraction, bubble cleaner, speech bubble erase, voice synthesis, webtoon compiler, ai video editor"
    />
    <meta name="author" content="Antigravity Studio" />
    <meta name="robots" content="index, follow" />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta
      property="og:url"
      content="https://github.com/dheena017/webtoon-to-video-backend"
    />
    <meta
      property="og:title"
      content="Webtoon-to-Video Studio - AI Storyboard & Video Production"
    />
    <meta
      property="og:description"
      content="Transform static webtoons into cinematic videos. Crop panels, clean speech bubbles, synthesize voice narration, generate music soundtracks, and produce high-quality videos using advanced AI."
    />
    <meta property="og:image" content="/favicon.svg" />
    <meta property="og:site_name" content="Webtoon-to-Video Studio" />

    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image" />
    <meta
      property="twitter:url"
      content="https://github.com/dheena017/webtoon-to-video-backend"
    />
    <meta
      property="twitter:title"
      content="Webtoon-to-Video Studio - AI Storyboard & Video Production"
    />
    <meta
      property="twitter:description"
      content="Transform static webtoons into cinematic videos. Crop panels, clean speech bubbles, synthesize voice narration, generate music soundtracks, and produce high-quality videos using advanced AI."
    />
    <meta property="twitter:image" content="/favicon.svg" />

    <!-- Mobile App Settings & Customization -->
    <meta name="theme-color" content="#070709" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta
      name="apple-mobile-web-app-status-bar-style"
      content="black-translucent"
    />
    <meta name="apple-mobile-web-app-title" content="Webtoon Video" />

    <!-- Icons & Favicons -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="alternate icon" href="/favicon.ico" type="image/x-icon" />
    <link rel="apple-touch-icon" href="/favicon.svg" />

    <!-- Performance Optimization: Resource Hints -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  </head>
  <body>
    <!-- Fallback message for disabled Javascript -->
    <noscript>
      <div
        style="
          display: flex;
          flex-direction: column;
          align-items: center;
          justify-content: center;
          height: 100vh;
          background-color: #070709;
          color: #fafafa;
          font-family: sans-serif;
          text-align: center;
          padding: 2rem;
        "
      >
        <h1 style="color: #ef4444; font-size: 2rem; margin-bottom: 1rem">
          JavaScript Required
        </h1>
        <p style="color: #a3a3a3; max-width: 500px">
          We're sorry, but Webtoon-to-Video Studio requires JavaScript to be
          enabled. Please enable JavaScript in your browser settings to
          continue.
        </p>
      </div>
    </noscript>

    <div id="root"></div>

    <!-- Splash / Loading Screen (replaced automatically when React mounts) -->
    <style>
      #splash-screen-root {
        position: fixed;
        inset: 0;
        background: #070709;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 16px;
        z-index: 9999;
        font-family: system-ui, -apple-system, sans-serif;
      }
      .sp-logo {
        width: 64px;
        height: 64px;
        border-radius: 16px;
        background: linear-gradient(135deg, #a855f7, #06b6d4);
        display: flex;
        align-items: center;
        justify-content: center;
        box-shadow: 0 0 32px rgba(168,85,247,0.35);
        margin-bottom: 4px;
      }
      .sp-logo svg { width: 36px; height: 36px; }
      .sp-name {
        font-size: 1.1rem;
        font-weight: 700;
        color: #ffffff;
        letter-spacing: -0.01em;
      }
      .sp-tag {
        font-size: 0.7rem;
        color: #71717a;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        margin-top: -8px;
      }
      .sp-spinner {
        width: 24px;
        height: 24px;
        color: #a855f7;
        animation: sp-spin 1s linear infinite;
        margin-top: 8px;
      }
      .sp-bar {
        width: 160px;
        height: 2px;
        background: #1c1c1e;
        border-radius: 9999px;
        overflow: hidden;
      }
      .sp-bar-fill {
        width: 40%;
        height: 100%;
        background: linear-gradient(to right, #a855f7, #06b6d4);
        border-radius: 9999px;
        animation: sp-shimmer 1.4s infinite ease-in-out;
      }
      @keyframes sp-spin {
        from { transform: rotate(0deg); }
        to   { transform: rotate(360deg); }
      }
      @keyframes sp-shimmer {
        0%   { margin-left: -40%; }
        100% { margin-left: 100%; }
      }
    </style>
    <div id="splash-screen-root">
      <div class="sp-logo">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
          <path d="M8 8h16v10H14l-4 4v-4H8z" fill="#ffffff"/>
          <polygon points="13,11 19,13 13,15" fill="url(#g)"/>
          <defs>
            <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%">
              <stop offset="0%" stop-color="#a855f7"/>
              <stop offset="100%" stop-color="#06b6d4"/>
            </linearGradient>
          </defs>
        </svg>
      </div>
      <div class="sp-name">Webtoon Studio</div>
      <div class="sp-tag">Initializing</div>
      <svg class="sp-spinner" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
        <circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="3" opacity="0.2"/>
        <path fill="currentColor" opacity="0.8" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"/>
      </svg>
      <div class="sp-bar"><div class="sp-bar-fill"></div></div>
    </div>



    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
